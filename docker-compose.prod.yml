version: "3.9"

# ── Production: nginx + backend-serves-frontend ────────────────────────────────
# Usage:
#   cd frontend && npm run build && cd ..
#   cp .env.example .env   # set SECRET_KEY, POSTGRES_PASSWORD, etc.
#   docker compose -f docker-compose.prod.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agenttalk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
      POSTGRES_DB: ${POSTGRES_DB:-agenttalk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenttalk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # One-shot migration runner
  migrate:
    build: { context: ., dockerfile: Dockerfile }
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agenttalk}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agenttalk}
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]
    restart: "no"

  # API serves both REST/WS AND the built React frontend from frontend/dist
  api:
    build: { context: ., dockerfile: Dockerfile }
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agenttalk}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agenttalk}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      APP_ENV: production
      ALLOWED_ORIGINS: '["https://yourdomain.com"]'
    command: >
      uvicorn app.main:app
        --host 0.0.0.0 --port 8000
        --workers 4
        --loop uvloop --http httptools
        --proxy-headers --forwarded-allow-ips='*'
    volumes:
      - ./frontend/dist:/app/frontend/dist:ro   # serve built frontend
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks: [internal, external]

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on: [api]
    networks: [internal, external]

volumes:
  postgres_data:
  redis_data:

networks:
  internal: { driver: bridge }
  external: { driver: bridge }
