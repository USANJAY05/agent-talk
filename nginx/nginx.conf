# AgentTalk — nginx reverse proxy configuration
# Handles: HTTP→HTTPS redirect, WebSocket upgrades, upstream load balancing

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75s;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           "strict-origin-when-cross-origin";
    server_tokens off;

    # ── Upstream: AgentTalk API instances ─────────────────────────────────────
    upstream agenttalk_api {
        least_conn;
        server api:8000;
        # Add more replicas here when scaling horizontally:
        # server api2:8000;
        keepalive 32;
    }

    # ── WebSocket upgrade map ──────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;  # Replace with your domain

        # TLS certificates
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # TLS hardening
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # HSTS (enable once cert is stable)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # ── Client limits ──────────────────────────────────────────────────────
        client_max_body_size 10m;

        # ── REST API ───────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://agenttalk_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── WebSocket endpoints ────────────────────────────────────────────────
        # Critical: ws:// connections need Upgrade + Connection headers forwarded
        location /ws/ {
            proxy_pass         http://agenttalk_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Long timeout for persistent WebSocket connections
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            proxy_connect_timeout 10s;
        }

        # ── OpenAPI docs ───────────────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi\.json) {
            proxy_pass         http://agenttalk_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Health probes (accessible without auth for load balancers) ─────────
        location /health/ {
            proxy_pass         http://agenttalk_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log off;
        }

        # ── Metrics (restrict to internal network in production) ───────────────
        location /metrics {
            # Uncomment to restrict to internal IPs only:
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass         http://agenttalk_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log off;
        }

        # ── Root ───────────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://agenttalk_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
