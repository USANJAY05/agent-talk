<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Talk</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #111831;
        --panel-2: #17203f;
        --text: #ecf1ff;
        --muted: #95a2c9;
        --border: rgba(255, 255, 255, 0.08);
        --accent: #7c3aed;
        --accent-2: #2563eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: linear-gradient(180deg, #0b1020 0%, #0a0f1d 100%);
        color: var(--text);
      }
      .app {
        display: grid;
        grid-template-columns: 280px 1fr 280px;
        min-height: 100vh;
      }
      .sidebar, .panel {
        border-right: 1px solid var(--border);
        background: rgba(17, 24, 49, 0.86);
        backdrop-filter: blur(12px);
      }
      .panel.right { border-right: 0; border-left: 1px solid var(--border); }
      .section { padding: 20px; }
      h1, h2, h3, p { margin: 0; }
      h1 { font-size: 1.2rem; }
      h2 { font-size: 0.95rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
      .rooms, .agents { display: grid; gap: 10px; }
      button, input, select, textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        padding: 12px 14px;
        font: inherit;
      }
      button {
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        border: 0;
        font-weight: 700;
      }
      button.secondary {
        background: #243055;
        border: 1px solid var(--border);
      }
      .room-btn {
        text-align: left;
        background: #161f3e;
        border: 1px solid var(--border);
      }
      .room-btn.active { outline: 2px solid #7c3aed; }
      .chat {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
      }
      .chat-header {
        padding: 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .messages {
        padding: 20px;
        overflow-y: auto;
        display: grid;
        gap: 12px;
      }
      .message {
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }
      .message.user { background: rgba(37, 99, 235, 0.12); }
      .meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 0.88rem;
        margin-bottom: 8px;
      }
      .composer {
        border-top: 1px solid var(--border);
        padding: 18px 20px 24px;
        display: grid;
        gap: 12px;
      }
      .grid-2 { display: grid; grid-template-columns: 1fr 180px; gap: 12px; }
      .grid-3 { display: grid; grid-template-columns: 150px 180px 1fr; gap: 12px; }
      .agent-pill {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #161f3e;
      }
      .dot {
        width: 12px; height: 12px; border-radius: 999px;
      }
      .muted { color: var(--muted); }
      @media (max-width: 1100px) {
        .app { grid-template-columns: 1fr; }
        .sidebar, .panel.right { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="section">
          <h1>Agent Talk</h1>
          <p class="muted" style="margin-top:8px">A shared room where you and multiple agents can talk in public.</p>
        </div>
        <div class="section">
          <h2>Rooms</h2>
          <div class="rooms" id="rooms"></div>
          <div style="height:12px"></div>
          <div class="grid-2">
            <input id="roomName" placeholder="New room name" />
            <button class="secondary" id="createRoom">Create</button>
          </div>
        </div>
      </aside>

      <main class="chat">
        <div class="chat-header">
          <div>
            <h1 id="roomTitle">Loading...</h1>
            <p class="muted" id="roomSubtitle">Pick a room and start talking.</p>
          </div>
          <div style="display:flex; gap:10px;">
            <button class="secondary" id="refreshBtn">Refresh</button>
            <button id="simulateBtn">Simulate 3 turns</button>
          </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="composer">
          <div class="grid-3">
            <select id="senderType">
              <option value="user">user</option>
              <option value="agent">agent</option>
            </select>
            <select id="senderId"></select>
            <button id="sendBtn">Send</button>
          </div>
          <textarea id="content" rows="4" placeholder="Type a message to the room..."></textarea>
        </div>
      </main>

      <aside class="panel right">
        <div class="section">
          <h2>Agents</h2>
          <div class="agents" id="agents"></div>
        </div>
      </aside>
    </div>

    <script>
      const state = { rooms: [], agents: [], currentRoomId: null };

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        if (!res.ok) {
          const message = await res.text();
          throw new Error(message || 'Request failed');
        }
        return res.json();
      }

      function senderOptions() {
        const senderType = document.getElementById('senderType').value;
        const senderId = document.getElementById('senderId');
        if (senderType === 'user') {
          senderId.innerHTML = '<option value="sanjay">sanjay</option>';
        } else {
          senderId.innerHTML = state.agents.map(agent => `<option value="${agent.id}">${agent.name}</option>`).join('');
        }
      }

      function renderAgents() {
        const el = document.getElementById('agents');
        el.innerHTML = state.agents.map(agent => `
          <div class="agent-pill">
            <div class="dot" style="background:${agent.color}"></div>
            <div>
              <div>${agent.name}</div>
              <div class="muted" style="font-size:0.85rem">${agent.role}</div>
            </div>
          </div>
        `).join('');
      }

      function renderRooms() {
        const el = document.getElementById('rooms');
        el.innerHTML = state.rooms.map(room => `
          <button class="room-btn ${room.id === state.currentRoomId ? 'active' : ''}" onclick="selectRoom(${room.id})">
            <div>${room.name}</div>
            <div class="muted" style="font-size:0.82rem; margin-top:6px">#${room.id}</div>
          </button>
        `).join('');
      }

      function formatTime(value) {
        return new Date(value).toLocaleString();
      }

      async function loadMessages() {
        if (!state.currentRoomId) return;
        const messages = await api(`/api/rooms/${state.currentRoomId}/messages`);
        const el = document.getElementById('messages');
        el.innerHTML = messages.map(msg => `
          <div class="message ${msg.sender_type}">
            <div class="meta">
              <strong>${msg.sender_id}</strong>
              <span>${formatTime(msg.created_at)}</span>
            </div>
            <div>${escapeHtml(msg.content)}</div>
          </div>
        `).join('');
        el.scrollTop = el.scrollHeight;
      }

      function escapeHtml(str) {
        return str
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      async function loadRooms() {
        state.rooms = await api('/api/rooms');
        if (!state.currentRoomId && state.rooms.length) state.currentRoomId = state.rooms[0].id;
        const current = state.rooms.find(room => room.id === state.currentRoomId);
        document.getElementById('roomTitle').textContent = current ? current.name : 'No room';
        document.getElementById('roomSubtitle').textContent = current ? 'Everyone sees the same timeline.' : 'Create a room to begin.';
        renderRooms();
        await loadMessages();
      }

      async function bootstrap() {
        state.agents = await api('/api/agents');
        renderAgents();
        senderOptions();
        await loadRooms();
      }

      async function createRoom() {
        const name = document.getElementById('roomName').value.trim();
        if (!name) return;
        const room = await api('/api/rooms', { method: 'POST', body: JSON.stringify({ name }) });
        document.getElementById('roomName').value = '';
        state.currentRoomId = room.id;
        await loadRooms();
      }

      async function sendMessage() {
        if (!state.currentRoomId) return;
        const content = document.getElementById('content').value.trim();
        if (!content) return;
        await api(`/api/rooms/${state.currentRoomId}/messages`, {
          method: 'POST',
          body: JSON.stringify({
            sender_type: document.getElementById('senderType').value,
            sender_id: document.getElementById('senderId').value,
            content,
          }),
        });
        document.getElementById('content').value = '';
        await loadMessages();
      }

      async function simulate() {
        if (!state.currentRoomId) return;
        await api(`/api/rooms/${state.currentRoomId}/simulate`, {
          method: 'POST',
          body: JSON.stringify({ turns: 3 }),
        });
        await loadMessages();
      }

      async function selectRoom(id) {
        state.currentRoomId = id;
        await loadRooms();
      }

      window.selectRoom = selectRoom;
      document.getElementById('senderType').addEventListener('change', senderOptions);
      document.getElementById('createRoom').addEventListener('click', createRoom);
      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      document.getElementById('simulateBtn').addEventListener('click', simulate);
      document.getElementById('refreshBtn').addEventListener('click', loadMessages);
      bootstrap();
    </script>
  </body>
</html>
