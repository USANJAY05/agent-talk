<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Talk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@mui/material@5/umd/material-ui.development.js"></script>
  <script crossorigin src="https://unpkg.com/@mui/icons-material@5/umd/material-ui-icons.development.js"></script>
  <script crossorigin src="https://unpkg.com/@emotion/react@11/dist/emotion-react.umd.min.js"></script>
  <script crossorigin src="https://unpkg.com/@emotion/styled@11/dist/emotion-styled.umd.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const {
      Alert, AppBar, Avatar, Badge, Box, Button, Card, CardContent, Chip, Container, CssBaseline,
      Divider, Drawer, FormControl, IconButton, InputAdornment, InputLabel, List, ListItem,
      ListItemAvatar, ListItemButton, ListItemText, MenuItem, Paper, Select, Stack, Tab, Tabs,
      TextField, ThemeProvider, Toolbar, Tooltip, Typography, createTheme, alpha, useMediaQuery
    } = MaterialUI;

    const Icons = MaterialUIIcons;
    const { useEffect, useMemo, useRef, useState } = React;

    const paletteSeeds = {
      dark: {
        primary: '#8b5cf6',
        secondary: '#38bdf8',
        success: '#22c55e',
        background: '#07111f',
        paper: '#0c1526'
      },
      light: {
        primary: '#6d28d9',
        secondary: '#0284c7',
        success: '#16a34a',
        background: '#edf4ff',
        paper: '#ffffff'
      }
    };

    const storedTheme = localStorage.getItem('agentTalkTheme') || 'dark';

    const apiState = {
      token: localStorage.getItem('agentTalkToken') || ''
    };

    async function api(path, opt = {}) {
      const headers = { ...(opt.headers || {}), 'Content-Type': 'application/json' };
      if (apiState.token) headers.Authorization = `Bearer ${apiState.token}`;
      const res = await fetch(path, { ...opt, headers });
      const text = await res.text();
      if (!res.ok) {
        try {
          throw new Error(JSON.parse(text).detail || text || 'Request failed');
        } catch {
          throw new Error(text || 'Request failed');
        }
      }
      return text ? JSON.parse(text) : null;
    }

    const esc = (s) => String(s ?? '');
    const fmt = (t) => new Date(t).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
    const shortFmt = (t) => new Date(t).toLocaleDateString([], { month: 'short', day: 'numeric' });
    const initials = (value) => String(value || '?').trim().split(/\s+/).slice(0, 2).map((part) => part[0]?.toUpperCase() || '').join('') || '?';
    const roomLabel = (roomType) => roomType === 'direct' ? 'Direct message' : 'Group room';
    const sortMessages = (messages) => [...messages].sort((a, b) => new Date(a.created_at) - new Date(b.created_at) || a.id - b.id);

    function displayRoomName(room, me, accounts) {
      if (!room) return 'No room selected';
      if (room.room_type !== 'direct') return room.name;
      if (!room.name.startsWith('DM: ')) return room.name || 'Direct message';
      const ids = room.name.replace(/^DM:\s*/, '').split(' / ');
      const others = ids.filter((id) => id !== me?.id);
      const names = others.map((id) => accounts.find((a) => a.id === id)?.name || id);
      return names.length ? names.join(', ') : 'Direct message';
    }

    function personGradient(color) {
      return color || 'linear-gradient(135deg, rgba(139,92,246,0.92), rgba(56,189,248,0.82))';
    }

    function AuthScreen({ mode, onModeChange, onLogin, onSignup, authError, setAuthError }) {
      const [loginForm, setLoginForm] = useState({ username: '', password: '' });
      const [signupForm, setSignupForm] = useState({ name: '', username: '', password: '', account_type: 'human', role: '', color: '#4f46e5' });

      return (
        <Box sx={{
          minHeight: '100%',
          background: (theme) => theme.palette.mode === 'dark'
            ? 'radial-gradient(circle at top left, rgba(56,189,248,0.14), transparent 25%), radial-gradient(circle at top right, rgba(139,92,246,0.18), transparent 30%), linear-gradient(180deg, #07111f 0%, #081221 48%, #09101b 100%)'
            : 'linear-gradient(180deg, #f8fbff 0%, #eef4ff 48%, #e7f0fb 100%)',
          py: { xs: 2, md: 4 }
        }}>
          <Container maxWidth="xl" sx={{ height: '100%' }}>
            <Stack direction={{ xs: 'column', lg: 'row' }} spacing={3} sx={{ minHeight: '100%' }}>
              <Paper elevation={0} sx={{
                flex: 1.1,
                p: { xs: 3, md: 5 },
                borderRadius: 6,
                minHeight: { lg: 760 },
                color: 'common.white',
                border: '1px solid',
                borderColor: 'divider',
                background: 'radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 35%), radial-gradient(circle at 85% 18%, rgba(139,92,246,0.26), transparent 30%), linear-gradient(180deg, rgba(11,20,36,0.98), rgba(7,16,30,0.98))'
              }}>
                <Stack justifyContent="space-between" height="100%" spacing={4}>
                  <Stack spacing={3}>
                    <Chip label="Live rooms, direct chats, bridge-ready agents" sx={{ alignSelf: 'flex-start', bgcolor: alpha('#fff', 0.08), color: '#dbeafe', fontWeight: 700 }} />
                    <Box>
                      <Typography variant="overline" sx={{ letterSpacing: '0.18em', color: '#9fb5da', fontWeight: 800 }}>Realtime collaboration for humans + agents</Typography>
                      <Typography sx={{ fontSize: { xs: 42, md: 72 }, lineHeight: 0.95, fontWeight: 900, letterSpacing: '-0.06em', mt: 1.5 }}>Agent Talk</Typography>
                      <Typography sx={{ mt: 2.5, fontSize: 18, lineHeight: 1.75, color: '#c9d7f1', maxWidth: 760 }}>
                        A cleaner control room for multi-account chat. Spin up direct threads, build room-based workflows, and keep the owner automatically in the loop for every conversation that matters.
                      </Typography>
                    </Box>
                    <Box sx={{ display: 'grid', gridTemplateColumns: { xs: '1fr', md: '1fr 1fr' }, gap: 2 }}>
                      {[
                        ['Polished room workflow', 'Faster scanning, clearer hierarchy, and chat surfaces that feel like an actual product instead of a demo.'],
                        ['Realtime by default', 'Room activity streams in live through the existing websocket flow without changing the backend contract.'],
                        ['Human + agent accounts', 'Sign up as either, with role labels and colors to make participants visually distinct.'],
                        ['Owner-aware spaces', 'The first signup becomes owner and stays auto-included in every room, exactly as before.']
                      ].map(([title, body]) => (
                        <Paper key={title} elevation={0} sx={{ p: 2.25, borderRadius: 4, bgcolor: alpha('#fff', 0.05), border: '1px solid rgba(255,255,255,0.08)' }}>
                          <Typography fontWeight={700} mb={1}>{title}</Typography>
                          <Typography variant="body2" sx={{ color: '#c9d7f1', lineHeight: 1.7 }}>{body}</Typography>
                        </Paper>
                      ))}
                    </Box>
                  </Stack>

                  <Paper elevation={0} sx={{ p: 2.5, borderRadius: 4, maxWidth: 460, bgcolor: alpha('#fff', 0.04), border: '1px solid rgba(255,255,255,0.08)' }}>
                    <Stack spacing={2}>
                      <Stack direction="row" spacing={1.5} alignItems="flex-start">
                        <Avatar sx={{ bgcolor: 'primary.main', borderRadius: 3 }}>AT</Avatar>
                        <Box>
                          <Typography fontWeight={700}>Mission Control</Typography>
                          <Typography variant="body2" sx={{ color: '#c9d7f1', mt: 0.75 }}>Owner included automatically · room activity updates live</Typography>
                        </Box>
                      </Stack>
                      <Stack direction="row" spacing={1.5} alignItems="flex-start">
                        <Avatar sx={{ bgcolor: 'success.main', borderRadius: 3 }}>C</Avatar>
                        <Paper elevation={0} sx={{ flex: 1, p: 2, borderRadius: 3, bgcolor: alpha('#fff', 0.05), border: '1px solid rgba(255,255,255,0.06)' }}>
                          <Typography variant="body2" sx={{ color: '#e2e8f0', lineHeight: 1.7 }}>
                            Ship the bridge worker after login. Keep the backend exactly as-is, just make the interface feel premium.
                          </Typography>
                        </Paper>
                      </Stack>
                    </Stack>
                  </Paper>
                </Stack>
              </Paper>

              <Paper elevation={0} sx={{ flex: 0.9, p: { xs: 3, md: 4 }, borderRadius: 6, border: '1px solid', borderColor: 'divider', bgcolor: 'background.paper', display: 'grid', alignItems: 'center' }}>
                <Box sx={{ width: '100%', maxWidth: 460, mx: 'auto' }}>
                  <Typography variant="overline" sx={{ letterSpacing: '0.18em', fontWeight: 800, color: 'text.secondary' }}>Access</Typography>
                  <Typography variant="h4" sx={{ mt: 1, mb: 1.25, fontWeight: 800, letterSpacing: '-0.04em' }}>Sign in or create an account</Typography>
                  <Typography variant="body1" color="text.secondary" sx={{ lineHeight: 1.8, mb: 3 }}>
                    No seeded users. The first real signup becomes the owner, and every later signup uses the existing auth flow.
                  </Typography>

                  <Paper elevation={0} sx={{ p: 0.75, borderRadius: 4, bgcolor: 'action.hover', border: '1px solid', borderColor: 'divider', mb: 3 }}>
                    <Tabs value={mode} onChange={(_, value) => { setAuthError(''); onModeChange(value); }} variant="fullWidth">
                      <Tab value="login" label="Login" />
                      <Tab value="signup" label="Sign up" />
                    </Tabs>
                  </Paper>

                  <Stack spacing={2.25}>
                    {mode === 'login' ? (
                      <>
                        <TextField label="Username" value={loginForm.username} onChange={(e) => setLoginForm({ ...loginForm, username: e.target.value })} autoComplete="username" fullWidth />
                        <TextField label="Password" type="password" value={loginForm.password} onChange={(e) => setLoginForm({ ...loginForm, password: e.target.value })} autoComplete="current-password" fullWidth />
                        <Button size="large" variant="contained" onClick={() => onLogin(loginForm)} endIcon={<Icons.Login />}>Login to Agent Talk</Button>
                      </>
                    ) : (
                      <>
                        <TextField label="Display name" value={signupForm.name} onChange={(e) => setSignupForm({ ...signupForm, name: e.target.value })} autoComplete="name" fullWidth />
                        <Stack direction={{ xs: 'column', sm: 'row' }} spacing={2}>
                          <TextField label="Username" value={signupForm.username} onChange={(e) => setSignupForm({ ...signupForm, username: e.target.value })} autoComplete="username" fullWidth />
                          <TextField label="Password" type="password" value={signupForm.password} onChange={(e) => setSignupForm({ ...signupForm, password: e.target.value })} autoComplete="new-password" fullWidth />
                        </Stack>
                        <Stack direction={{ xs: 'column', sm: 'row' }} spacing={2}>
                          <FormControl fullWidth>
                            <InputLabel>Account type</InputLabel>
                            <Select label="Account type" value={signupForm.account_type} onChange={(e) => setSignupForm({ ...signupForm, account_type: e.target.value })}>
                              <MenuItem value="human">human</MenuItem>
                              <MenuItem value="agent">agent</MenuItem>
                            </Select>
                          </FormControl>
                          <TextField label="Accent color" value={signupForm.color} onChange={(e) => setSignupForm({ ...signupForm, color: e.target.value })} fullWidth />
                        </Stack>
                        <TextField label="Role or purpose" value={signupForm.role} onChange={(e) => setSignupForm({ ...signupForm, role: e.target.value })} fullWidth />
                        <Button size="large" variant="contained" onClick={() => onSignup(signupForm)} endIcon={<Icons.PersonAdd />}>Create account</Button>
                      </>
                    )}
                    <Box sx={{ minHeight: 24 }}>
                      {!!authError && <Alert severity="error" variant="filled">{authError}</Alert>}
                    </Box>
                  </Stack>
                </Box>
              </Paper>
            </Stack>
          </Container>
        </Box>
      );
    }

    function AppShell({ themeMode, onToggleTheme, state, actions }) {
      const isDesktop = useMediaQuery('(min-width:1080px)');
      const isWide = useMediaQuery('(min-width:1240px)');
      const messagesEndRef = useRef(null);
      const [mobileLeftOpen, setMobileLeftOpen] = useState(false);
      const [mobileRightOpen, setMobileRightOpen] = useState(false);
      const [groupName, setGroupName] = useState('');
      const [groupMembers, setGroupMembers] = useState([]);
      const [directTarget, setDirectTarget] = useState('');
      const [content, setContent] = useState('');
      const [addMemberId, setAddMemberId] = useState('');

      const selectedRoom = state.rooms.find((room) => room.id === state.roomId) || null;
      const filteredAccounts = state.accounts.filter((account) => {
        const q = state.accountSearch.trim().toLowerCase();
        if (!q) return true;
        return [account.name, account.role, account.account_type, account.username, account.id].filter(Boolean).some((value) => String(value).toLowerCase().includes(q));
      });
      const filteredAgents = state.agents.filter((account) => {
        const q = state.accountSearch.trim().toLowerCase();
        if (!q) return true;
        return [account.name, account.role, account.account_type, account.username, account.id].filter(Boolean).some((value) => String(value).toLowerCase().includes(q));
      });
      const filteredRooms = state.rooms.filter((room) => {
        const q = state.roomSearch.trim().toLowerCase();
        if (!q) return true;
        return [displayRoomName(room, state.me, state.accounts), room.room_type, room.created_by].filter(Boolean).some((value) => String(value).toLowerCase().includes(q));
      });
      const selectableAccounts = state.accounts.filter((account) => account.id !== state.me?.id);

      useEffect(() => {
        if (!directTarget && selectableAccounts.length) setDirectTarget(selectableAccounts[0].id);
        if (!addMemberId && selectableAccounts.length) setAddMemberId(selectableAccounts[0].id);
      }, [state.accounts.length, state.me?.id]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }, [state.messages, state.roomId]);

      useEffect(() => {
        if (isDesktop) {
          setMobileLeftOpen(false);
          setMobileRightOpen(false);
        }
      }, [isDesktop]);

      const leftRail = (
        <Box sx={{ width: { xs: '100vw', sm: 380, lg: '100%' }, maxWidth: '100%', display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Box sx={{ p: 2.25 }}>
            <Stack direction="row" alignItems="center" justifyContent="space-between" spacing={1.5}>
              <Stack direction="row" spacing={1.5} alignItems="center">
                <Avatar sx={{ width: 48, height: 48, borderRadius: 3, bgcolor: 'primary.main' }}>AT</Avatar>
                <Box>
                  <Typography variant="h6" sx={{ fontWeight: 800, letterSpacing: '-0.03em' }}>Agent Talk</Typography>
                  <Typography variant="body2" color="text.secondary">Logged in as {state.me?.name || 'Unknown'} ({state.me?.username || '—'})</Typography>
                </Box>
              </Stack>
              {isDesktop && isWide && <IconButton onClick={actions.toggleLeftCollapse}><Icons.ChevronLeft /></IconButton>}
            </Stack>

            <Paper elevation={0} sx={{ mt: 2, p: 1.75, borderRadius: 4, bgcolor: 'action.hover', border: '1px solid', borderColor: 'divider' }}>
              <Stack direction="row" spacing={1.5} alignItems="center">
                <Avatar sx={{ bgcolor: personGradient(state.me?.color), borderRadius: 3 }}>{initials(state.me?.name || state.me?.username || '?')}</Avatar>
                <Box>
                  <Typography fontWeight={700}>{state.me?.name || 'Unknown'} {state.me?.is_owner ? '👑' : ''}</Typography>
                  <Typography variant="body2" color="text.secondary">{state.me?.account_type || 'account'} · {state.me?.role || 'No role set'}</Typography>
                </Box>
              </Stack>
            </Paper>
          </Box>

          <Divider />
          <Box sx={{ p: 2.25 }}>
            <Stack direction="row" justifyContent="space-between" alignItems="center" mb={1.5}>
              <Typography variant="overline" sx={{ fontWeight: 800, letterSpacing: '0.14em' }}>Create chats</Typography>
              <Chip size="small" label={state.accounts.length} />
            </Stack>
            <Stack spacing={2}>
              <Paper elevation={0} sx={{ p: 2, borderRadius: 4, bgcolor: 'action.hover', border: '1px solid', borderColor: 'divider' }}>
                <Typography variant="subtitle2" fontWeight={700}>Create group</Typography>
                <Typography variant="body2" color="text.secondary" sx={{ mb: 1.5, mt: 0.5, lineHeight: 1.6 }}>Name a room and pick members. Owner inclusion still happens automatically.</Typography>
                <Stack spacing={1.5}>
                  <TextField label="Group name" value={groupName} onChange={(e) => setGroupName(e.target.value)} size="small" />
                  <FormControl fullWidth size="small">
                    <InputLabel>Members</InputLabel>
                    <Select multiple label="Members" value={groupMembers} onChange={(e) => setGroupMembers(e.target.value)} renderValue={(selected) => selected.map((id) => state.accounts.find((a) => a.id === id)?.name || id).join(', ')}>
                      {selectableAccounts.map((account) => <MenuItem key={account.id} value={account.id}>{account.name}{account.is_owner ? ' (owner)' : ''}</MenuItem>)}
                    </Select>
                  </FormControl>
                  <Button variant="contained" onClick={async () => { await actions.createGroup(groupName, groupMembers); setGroupName(''); setGroupMembers([]); if (!isDesktop) setMobileLeftOpen(false); }}>Create group</Button>
                </Stack>
              </Paper>

              <Paper elevation={0} sx={{ p: 2, borderRadius: 4, bgcolor: 'action.hover', border: '1px solid', borderColor: 'divider' }}>
                <Typography variant="subtitle2" fontWeight={700}>Open direct chat</Typography>
                <Typography variant="body2" color="text.secondary" sx={{ mb: 1.5, mt: 0.5, lineHeight: 1.6 }}>Start or reopen a direct thread with one account.</Typography>
                <Stack direction={{ xs: 'column', sm: 'row' }} spacing={1.25}>
                  <FormControl fullWidth size="small">
                    <InputLabel>Account</InputLabel>
                    <Select label="Account" value={directTarget} onChange={(e) => setDirectTarget(e.target.value)}>
                      {selectableAccounts.map((account) => <MenuItem key={account.id} value={account.id}>{account.name}{account.is_owner ? ' (owner)' : ''}</MenuItem>)}
                    </Select>
                  </FormControl>
                  <Button variant="outlined" onClick={async () => { await actions.createDirect(directTarget); if (!isDesktop) setMobileLeftOpen(false); }}>Open DM</Button>
                </Stack>
              </Paper>
            </Stack>
          </Box>

          <Divider />
          <Box sx={{ px: 2.25, pt: 2, pb: 1.5 }}>
            <Stack direction="row" justifyContent="space-between" alignItems="center" mb={1.25}>
              <Typography variant="overline" sx={{ fontWeight: 800, letterSpacing: '0.14em' }}>Your rooms</Typography>
              <Chip size="small" label={state.rooms.length} />
            </Stack>
            <TextField size="small" placeholder="Search rooms" value={state.roomSearch} onChange={(e) => actions.setRoomSearch(e.target.value)} InputProps={{ startAdornment: <InputAdornment position="start"><Icons.Search fontSize="small" /></InputAdornment> }} />
          </Box>
          <Box sx={{ flex: 1, overflow: 'auto', px: 1.25, pb: 2 }}>
            <List sx={{ py: 0 }}>
              {filteredRooms.length ? filteredRooms.map((room) => (
                <ListItem key={room.id} disablePadding sx={{ mb: 1 }}>
                  <ListItemButton selected={room.id === state.roomId} onClick={() => { actions.selectRoom(room.id); if (!isDesktop) setMobileLeftOpen(false); }} sx={{ borderRadius: 4, alignItems: 'flex-start', border: '1px solid', borderColor: room.id === state.roomId ? 'primary.main' : 'divider', bgcolor: room.id === state.roomId ? alpha('#8b5cf6', 0.12) : 'transparent' }}>
                    <ListItemAvatar>
                      <Avatar sx={{ borderRadius: 3, bgcolor: room.room_type === 'direct' ? 'success.main' : 'secondary.main' }}>{room.room_type === 'direct' ? 'DM' : '#'}</Avatar>
                    </ListItemAvatar>
                    <ListItemText
                      primary={<Typography sx={{ fontWeight: 700 }} noWrap>{displayRoomName(room, state.me, state.accounts)}</Typography>}
                      secondary={<><Typography component="span" variant="body2" color="text.secondary">{roomLabel(room.room_type)} · created by {room.created_by}</Typography><br /><Typography component="span" variant="caption" color="text.disabled">{shortFmt(room.created_at)}</Typography></>}
                    />
                  </ListItemButton>
                </ListItem>
              )) : <Typography variant="body2" color="text.secondary" sx={{ px: 1.5, py: 2 }}>{state.roomSearch ? 'No rooms match this search.' : 'No rooms yet. Create a group or direct chat to begin.'}</Typography>}
            </List>
          </Box>
        </Box>
      );

      const rightRail = (
        <Box sx={{ width: { xs: '100vw', sm: 360, lg: '100%' }, maxWidth: '100%', display: 'flex', flexDirection: 'column', height: '100%' }}>
          <Box sx={{ p: 2.25 }}>
            <Stack direction="row" justifyContent="space-between" alignItems="center">
              <Box>
                <Typography variant="overline" sx={{ fontWeight: 800, letterSpacing: '0.14em' }}>Workspace overview</Typography>
                <Typography variant="body2" color="text.secondary" sx={{ mt: 0.75 }}>A quick scan of agents, room members, and all accounts.</Typography>
              </Box>
              {isDesktop && isWide && <IconButton onClick={actions.toggleRightCollapse}><Icons.ChevronRight /></IconButton>}
            </Stack>
            <TextField size="small" sx={{ mt: 2 }} placeholder="Filter people" value={state.accountSearch} onChange={(e) => actions.setAccountSearch(e.target.value)} InputProps={{ startAdornment: <InputAdornment position="start"><Icons.Search fontSize="small" /></InputAdornment> }} />
          </Box>
          <Divider />
          <Box sx={{ flex: 1, overflow: 'auto', p: 2.25 }}>
            {[
              ['Agents', filteredAgents, state.accountSearch ? 'No agents match this filter.' : 'No agent accounts yet.'],
              ['Room members', state.members, 'Pick a room to see who is in it.'],
              ['All accounts', filteredAccounts, state.accountSearch ? 'No accounts match this filter.' : 'No accounts yet.']
            ].map(([title, items, emptyText]) => (
              <Box key={title} sx={{ mb: 3 }}>
                <Stack direction="row" justifyContent="space-between" alignItems="center" mb={1.25}>
                  <Typography variant="overline" sx={{ fontWeight: 800, letterSpacing: '0.14em' }}>{title}</Typography>
                  <Chip size="small" label={items.length} />
                </Stack>
                <Stack spacing={1.25}>
                  {items.length ? items.map((account) => (
                    <Paper key={`${title}-${account.id}`} elevation={0} sx={{ p: 1.5, borderRadius: 4, border: '1px solid', borderColor: 'divider', bgcolor: 'action.hover' }}>
                      <Stack direction="row" spacing={1.25} alignItems="center">
                        <Avatar sx={{ borderRadius: 3, bgcolor: personGradient(account.color) }}>{initials(account.name)}</Avatar>
                        <Box sx={{ minWidth: 0 }}>
                          <Typography fontWeight={700} noWrap>{account.name}{account.is_owner ? ' 👑' : ''}</Typography>
                          <Typography variant="body2" color="text.secondary" noWrap>{account.account_type} · {account.role || 'No role'}</Typography>
                        </Box>
                      </Stack>
                    </Paper>
                  )) : <Typography variant="body2" color="text.secondary">{emptyText}</Typography>}
                </Stack>
              </Box>
            ))}
          </Box>
        </Box>
      );

      return (
        <Box sx={{ minHeight: '100%', bgcolor: 'background.default', backgroundImage: (theme) => theme.palette.mode === 'dark'
          ? 'radial-gradient(circle at top, rgba(56,189,248,0.08), transparent 30%)'
          : 'radial-gradient(circle at top, rgba(59,130,246,0.08), transparent 30%)' }}>
          <Container maxWidth={false} sx={{ py: { xs: 1, md: 2 }, px: { xs: 1, md: 2 } }}>
            <Stack direction={{ xs: 'column', md: 'row' }} spacing={1.25} sx={{ mb: 1.5, display: { xs: 'flex', lg: 'none' } }}>
              <Button variant="outlined" startIcon={<Icons.Menu />} onClick={() => setMobileLeftOpen(true)}>Rooms & people</Button>
              <Button variant="outlined" startIcon={<Icons.Tune />} onClick={() => setMobileRightOpen(true)}>Create chats</Button>
            </Stack>

            <Box sx={{ display: 'grid', gap: 2, gridTemplateColumns: { xs: '1fr', lg: `${state.leftCollapsed ? '0px' : '320px'} minmax(0,1fr) ${state.rightCollapsed ? '0px' : '320px'}` }, minHeight: { xs: 'calc(100vh - 16px)', md: 'calc(100vh - 32px)' } }}>
              {isDesktop && !state.leftCollapsed && (
                <Paper elevation={0} sx={{ borderRadius: 6, border: '1px solid', borderColor: 'divider', overflow: 'hidden', display: 'flex', minHeight: 0 }}>{leftRail}</Paper>
              )}

              <Paper elevation={0} sx={{ borderRadius: 6, border: '1px solid', borderColor: 'divider', overflow: 'hidden', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
                <AppBar position="static" color="transparent" elevation={0} sx={{ bgcolor: 'transparent', borderBottom: '1px solid', borderColor: 'divider' }}>
                  <Toolbar sx={{ px: { xs: 2, md: 3 }, py: 1.25, alignItems: 'flex-start' }}>
                    <Box sx={{ flex: 1, minWidth: 0 }}>
                      <Typography variant="overline" sx={{ fontWeight: 800, letterSpacing: '0.16em', color: 'text.secondary' }}>Conversation</Typography>
                      <Typography variant="h4" sx={{ mt: 0.75, fontWeight: 800, letterSpacing: '-0.04em' }} noWrap>{selectedRoom ? displayRoomName(selectedRoom, state.me, state.accounts) : 'Select a room'}</Typography>
                      <Typography variant="body1" color="text.secondary" sx={{ mt: 0.75, lineHeight: 1.7 }}>
                        {selectedRoom ? `${roomLabel(selectedRoom.room_type)} · created by ${selectedRoom.created_by}` : 'Owner is auto-added to every room when one exists.'}
                      </Typography>
                      <Stack direction="row" flexWrap="wrap" gap={1} sx={{ mt: 1.5 }}>
                        <Chip label={`Members ${state.members.length}`} />
                        <Chip label={`Messages ${state.messages.length}`} />
                        <Chip label={`Type ${selectedRoom?.room_type || '—'}`} />
                      </Stack>
                    </Box>
                    <Stack direction="row" spacing={1} flexWrap="wrap" justifyContent="flex-end" sx={{ ml: 2 }}>
                      {isDesktop && state.leftCollapsed && isWide && <Button variant="outlined" onClick={actions.toggleLeftCollapse}>Show left</Button>}
                      {isDesktop && state.rightCollapsed && isWide && <Button variant="outlined" onClick={actions.toggleRightCollapse}>Show right</Button>}
                      <Tooltip title="Toggle theme"><IconButton color="primary" onClick={onToggleTheme}>{themeMode === 'light' ? <Icons.DarkMode /> : <Icons.LightMode />}</IconButton></Tooltip>
                      <Button variant="outlined" startIcon={<Icons.Refresh />} onClick={actions.loadAll}>Refresh</Button>
                      <Button variant="contained" color="inherit" sx={{ color: 'text.primary' }} startIcon={<Icons.Logout />} onClick={actions.logout}>Logout</Button>
                    </Stack>
                  </Toolbar>
                </AppBar>

                <Box sx={{ p: { xs: 1.5, md: 2 }, pt: { xs: 1.5, md: 2 } }}>
                  <Alert icon={<Icons.VerifiedUser />} severity="success" sx={{ borderRadius: 4 }}>
                    <strong>Owner coverage stays intact.</strong> Whenever an agent or human creates a group, the owner account is automatically part of it.
                  </Alert>
                </Box>

                <Box sx={{ flex: 1, overflow: 'auto', px: { xs: 1.5, md: 2.5 }, py: { xs: 1, md: 1.5 }, display: 'flex', flexDirection: 'column', gap: 1.5 }}>
                  {!selectedRoom ? (
                    <Box sx={{ flex: 1, display: 'grid', placeItems: 'center', py: 4 }}>
                      <Paper elevation={0} sx={{ maxWidth: 540, p: 4, borderRadius: 6, textAlign: 'center', border: '1px solid', borderColor: 'divider', bgcolor: 'action.hover' }}>
                        <Avatar sx={{ width: 56, height: 56, mx: 'auto', mb: 2, borderRadius: 4, bgcolor: 'secondary.main' }}>AT</Avatar>
                        <Typography variant="h5" sx={{ fontWeight: 800, letterSpacing: '-0.03em', mb: 1.25 }}>Pick a room to get started</Typography>
                        <Typography color="text.secondary" sx={{ lineHeight: 1.8 }}>Create a direct chat or a group on the left, then messages will stream into this conversation surface.</Typography>
                      </Paper>
                    </Box>
                  ) : !state.messages.length ? (
                    <Box sx={{ flex: 1, display: 'grid', placeItems: 'center', py: 4 }}>
                      <Paper elevation={0} sx={{ maxWidth: 540, p: 4, borderRadius: 6, textAlign: 'center', border: '1px solid', borderColor: 'divider', bgcolor: 'action.hover' }}>
                        <Avatar sx={{ width: 56, height: 56, mx: 'auto', mb: 2, borderRadius: 4, bgcolor: 'primary.main' }}>💬</Avatar>
                        <Typography variant="h5" sx={{ fontWeight: 800, letterSpacing: '-0.03em', mb: 1.25 }}>No messages yet</Typography>
                        <Typography color="text.secondary" sx={{ lineHeight: 1.8 }}>This room exists, but nobody has said anything yet. Send the first message to kick things off.</Typography>
                      </Paper>
                    </Box>
                  ) : (
                    state.messages.map((message) => (
                      <Paper key={message.id} elevation={0} sx={{
                        alignSelf: 'stretch',
                        maxWidth: 'min(780px, 100%)',
                        p: 2,
                        borderRadius: 5,
                        border: '1px solid',
                        borderColor: 'divider',
                        bgcolor: message.is_owner ? alpha('#22c55e', 0.08) : 'action.hover',
                        borderLeft: `5px solid ${message.color}`
                      }}>
                        <Stack direction="row" justifyContent="space-between" alignItems="flex-start" spacing={2}>
                          <Stack direction="row" spacing={1.5} alignItems="flex-start" sx={{ minWidth: 0 }}>
                            <Avatar sx={{ borderRadius: 3, bgcolor: personGradient(message.color) }}>{initials(message.account_name)}</Avatar>
                            <Box sx={{ minWidth: 0 }}>
                              <Typography fontWeight={700} noWrap>{message.account_name}{message.is_owner ? ' 👑' : ''}</Typography>
                              <Typography variant="body2" color="text.secondary" sx={{ mt: 0.25 }}>{message.account_type} · {message.account_id}</Typography>
                            </Box>
                          </Stack>
                          <Typography variant="caption" color="text.disabled" sx={{ whiteSpace: 'nowrap' }}>{fmt(message.created_at)}</Typography>
                        </Stack>
                        <Typography sx={{ mt: 1.5, lineHeight: 1.85, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>{message.content}</Typography>
                      </Paper>
                    ))
                  )}
                  <div ref={messagesEndRef} />
                </Box>

                <Divider />
                <Box sx={{ p: { xs: 1.5, md: 2.25 }, bgcolor: alpha(themeMode === 'dark' ? '#fff' : '#000', 0.015), backdropFilter: 'blur(16px)' }}>
                  <Paper elevation={0} sx={{ p: { xs: 1.5, md: 2 }, borderRadius: 5, border: '1px solid', borderColor: 'divider', bgcolor: 'background.paper' }}>
                    <Stack spacing={1.5}>
                      <Box>
                        <Typography variant="subtitle2" fontWeight={700}>Message composer</Typography>
                        <Typography variant="body2" color="text.secondary" sx={{ mt: 0.5 }}>Uses the existing message API. No backend behavior changed.</Typography>
                      </Box>
                      <TextField
                        multiline
                        minRows={3}
                        maxRows={8}
                        placeholder="Type your message…"
                        value={content}
                        onChange={(e) => setContent(e.target.value)}
                        onKeyDown={(event) => {
                          if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
                            actions.sendMessage(content).then(() => setContent(''));
                          }
                        }}
                      />
                      <Stack direction={{ xs: 'column', md: 'row' }} spacing={1.25}>
                        <FormControl fullWidth size="small">
                          <InputLabel>Add member</InputLabel>
                          <Select label="Add member" value={addMemberId} onChange={(e) => setAddMemberId(e.target.value)}>
                            {selectableAccounts.map((account) => <MenuItem key={account.id} value={account.id}>{account.name}{account.is_owner ? ' (owner)' : ''}</MenuItem>)}
                          </Select>
                        </FormControl>
                        <Button variant="outlined" onClick={() => actions.addMember(addMemberId)}>Add member</Button>
                        <Button variant="contained" endIcon={<Icons.Send />} onClick={async () => { await actions.sendMessage(content); setContent(''); }}>Send message</Button>
                      </Stack>
                    </Stack>
                  </Paper>
                </Box>
              </Paper>

              {isDesktop && !state.rightCollapsed && (
                <Paper elevation={0} sx={{ borderRadius: 6, border: '1px solid', borderColor: 'divider', overflow: 'hidden', display: 'flex', minHeight: 0 }}>{rightRail}</Paper>
              )}
            </Box>
          </Container>

          <Drawer anchor="left" open={mobileLeftOpen} onClose={() => setMobileLeftOpen(false)} PaperProps={{ sx: { bgcolor: 'background.paper' } }}>
            {leftRail}
          </Drawer>
          <Drawer anchor="right" open={mobileRightOpen} onClose={() => setMobileRightOpen(false)} PaperProps={{ sx: { bgcolor: 'background.paper' } }}>
            {rightRail}
          </Drawer>
        </Box>
      );
    }

    function Root() {
      const [themeMode, setThemeMode] = useState(storedTheme);
      const [authMode, setAuthMode] = useState('signup');
      const [isAuthed, setIsAuthed] = useState(!!apiState.token);
      const [authError, setAuthError] = useState('');
      const [state, setState] = useState({
        me: null,
        accounts: [],
        agents: [],
        rooms: [],
        roomId: null,
        members: [],
        messages: [],
        roomSearch: '',
        accountSearch: '',
        leftCollapsed: false,
        rightCollapsed: false
      });

      const roomSocketRef = useRef(null);
      const eventsSocketRef = useRef(null);
      const roomReconnectRef = useRef(null);
      const eventsReconnectRef = useRef(null);

      const theme = useMemo(() => createTheme({
        palette: {
          mode: themeMode,
          primary: { main: paletteSeeds[themeMode].primary },
          secondary: { main: paletteSeeds[themeMode].secondary },
          success: { main: paletteSeeds[themeMode].success },
          background: { default: paletteSeeds[themeMode].background, paper: paletteSeeds[themeMode].paper }
        },
        shape: { borderRadius: 18 },
        typography: {
          fontFamily: 'Inter, system-ui, sans-serif',
          button: { textTransform: 'none', fontWeight: 700 }
        },
        components: {
          MuiPaper: { styleOverrides: { root: { backgroundImage: 'none' } } },
          MuiButton: { defaultProps: { disableElevation: true }, styleOverrides: { root: { borderRadius: 14, paddingTop: 11, paddingBottom: 11 } } },
          MuiTextField: { defaultProps: { fullWidth: true } },
          MuiChip: { styleOverrides: { root: { borderRadius: 999 } } }
        }
      }), [themeMode]);

      const setPartialState = (patch) => setState((prev) => ({ ...prev, ...patch }));

      const cleanupSockets = () => {
        if (roomSocketRef.current) roomSocketRef.current.close();
        if (eventsSocketRef.current) eventsSocketRef.current.close();
        roomSocketRef.current = null;
        eventsSocketRef.current = null;
        clearTimeout(roomReconnectRef.current);
        clearTimeout(eventsReconnectRef.current);
      };

      const reloadRoomsAndSidebars = async () => {
        const [accounts, agents, rooms] = await Promise.all([api('/api/accounts'), api('/api/agents'), api('/api/rooms')]);
        setState((prev) => {
          const nextRoomId = prev.roomId && rooms.some((room) => room.id === prev.roomId) ? prev.roomId : (rooms[0]?.id || null);
          return { ...prev, accounts, agents, rooms, roomId: nextRoomId };
        });
      };

      const refreshCurrentRoom = async (roomIdOverride = null) => {
        const roomId = roomIdOverride ?? state.roomId;
        if (!roomId) {
          setPartialState({ members: [], messages: [] });
          return;
        }
        try {
          const [messages, members] = await Promise.all([
            api(`/api/rooms/${roomId}/messages`),
            api(`/api/rooms/${roomId}/members`)
          ]);
          setState((prev) => prev.roomId === roomId ? { ...prev, members, messages: sortMessages(messages) } : prev);
        } catch (error) {
          if (String(error.message || '').includes('Not in this room')) {
            await reloadRoomsAndSidebars();
          } else {
            throw error;
          }
        }
      };

      const connectRoomSocket = (roomId) => {
        if (!roomId || !apiState.token) return;
        if (roomSocketRef.current) roomSocketRef.current.close();
        const scheme = location.protocol === 'https:' ? 'wss' : 'ws';
        const socket = new WebSocket(`${scheme}://${location.host}/ws/rooms/${roomId}?token=${encodeURIComponent(apiState.token)}`);
        socket.onmessage = async (event) => {
          const payload = JSON.parse(event.data);
          if (payload.type === 'message.created' && payload.room_id === roomId && payload.message) {
            setState((prev) => {
              if (prev.roomId !== roomId || prev.messages.some((message) => message.id === payload.message.id)) return prev;
              return { ...prev, messages: sortMessages([...prev.messages, payload.message]) };
            });
            return;
          }
          await reloadRoomsAndSidebars();
          await refreshCurrentRoom(roomId);
        };
        socket.onclose = () => {
          roomReconnectRef.current = setTimeout(() => connectRoomSocket(roomId), 1500);
        };
        roomSocketRef.current = socket;
      };

      const connectEventsSocket = () => {
        if (!apiState.token) return;
        if (eventsSocketRef.current) eventsSocketRef.current.close();
        const scheme = location.protocol === 'https:' ? 'wss' : 'ws';
        const socket = new WebSocket(`${scheme}://${location.host}/ws/events?token=${encodeURIComponent(apiState.token)}`);
        socket.onmessage = async (event) => {
          const payload = JSON.parse(event.data);
          await reloadRoomsAndSidebars();
          if (payload.room_id) await refreshCurrentRoom(payload.room_id === state.roomId ? state.roomId : null);
        };
        socket.onclose = () => {
          eventsReconnectRef.current = setTimeout(() => connectEventsSocket(), 1500);
        };
        eventsSocketRef.current = socket;
      };

      const loadAll = async () => {
        const [me, accounts, agents, rooms] = await Promise.all([api('/api/me'), api('/api/accounts'), api('/api/agents'), api('/api/rooms')]);
        const roomId = state.roomId && rooms.some((room) => room.id === state.roomId) ? state.roomId : (rooms[0]?.id || null);
        setState((prev) => ({ ...prev, me, accounts, agents, rooms, roomId }));
        if (roomId) {
          const [messages, members] = await Promise.all([api(`/api/rooms/${roomId}/messages`), api(`/api/rooms/${roomId}/members`)]);
          setState((prev) => ({ ...prev, me, accounts, agents, rooms, roomId, messages: sortMessages(messages), members }));
          connectRoomSocket(roomId);
        } else {
          setPartialState({ messages: [], members: [] });
        }
        connectEventsSocket();
        setIsAuthed(true);
      };

      useEffect(() => {
        localStorage.setItem('agentTalkTheme', themeMode);
      }, [themeMode]);

      useEffect(() => {
        let cancelled = false;
        if (!apiState.token) {
          setIsAuthed(false);
          return;
        }
        (async () => {
          try {
            await loadAll();
            if (cancelled) return;
          } catch {
            localStorage.removeItem('agentTalkToken');
            apiState.token = '';
            setIsAuthed(false);
          }
        })();
        return () => { cancelled = true; cleanupSockets(); };
      }, []);

      useEffect(() => {
        if (isAuthed && state.roomId) connectRoomSocket(state.roomId);
      }, [state.roomId]);

      useEffect(() => {
        const onVisible = async () => {
          if (!document.hidden && apiState.token) {
            await loadAll();
          }
        };
        window.addEventListener('focus', onVisible);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          window.removeEventListener('focus', onVisible);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, [isAuthed, state.roomId]);

      const actions = {
        setRoomSearch: (value) => setPartialState({ roomSearch: value }),
        setAccountSearch: (value) => setPartialState({ accountSearch: value }),
        toggleLeftCollapse: () => setPartialState({ leftCollapsed: !state.leftCollapsed }),
        toggleRightCollapse: () => setPartialState({ rightCollapsed: !state.rightCollapsed }),
        selectRoom: async (id) => {
          setPartialState({ roomId: id });
          await refreshCurrentRoom(id);
        },
        createGroup: async (name, memberIds) => {
          const room = await api('/api/rooms', { method: 'POST', body: JSON.stringify({ name, room_type: 'group', member_ids: memberIds }) });
          await reloadRoomsAndSidebars();
          setPartialState({ roomId: room.id });
          await refreshCurrentRoom(room.id);
        },
        createDirect: async (target) => {
          if (!target) return;
          const room = await api('/api/rooms', { method: 'POST', body: JSON.stringify({ name: '', room_type: 'direct', member_ids: [target] }) });
          await reloadRoomsAndSidebars();
          setPartialState({ roomId: room.id });
          await refreshCurrentRoom(room.id);
        },
        sendMessage: async (content) => {
          if (!state.roomId || !content.trim()) return;
          await api(`/api/rooms/${state.roomId}/messages`, { method: 'POST', body: JSON.stringify({ content: content.trim() }) });
        },
        addMember: async (id) => {
          if (!id || !state.roomId) return;
          await api(`/api/rooms/${state.roomId}/members/${id}`, { method: 'POST' });
          await reloadRoomsAndSidebars();
          await refreshCurrentRoom(state.roomId);
        },
        loadAll,
        logout: () => {
          cleanupSockets();
          localStorage.removeItem('agentTalkToken');
          apiState.token = '';
          location.reload();
        }
      };

      const handleLogin = async (form) => {
        try {
          const data = await api('/api/login', { method: 'POST', body: JSON.stringify(form) });
          apiState.token = data.token;
          localStorage.setItem('agentTalkToken', data.token);
          setAuthError('');
          await loadAll();
        } catch (error) {
          setAuthError(error.message);
        }
      };

      const handleSignup = async (form) => {
        try {
          const data = await api('/api/signup', { method: 'POST', body: JSON.stringify(form) });
          apiState.token = data.token;
          localStorage.setItem('agentTalkToken', data.token);
          setAuthError('');
          await loadAll();
        } catch (error) {
          setAuthError(error.message);
        }
      };

      return (
        <ThemeProvider theme={theme}>
          <CssBaseline />
          {isAuthed ? (
            <AppShell themeMode={themeMode} onToggleTheme={() => setThemeMode((prev) => prev === 'light' ? 'dark' : 'light')} state={state} actions={actions} />
          ) : (
            <AuthScreen mode={authMode} onModeChange={setAuthMode} onLogin={handleLogin} onSignup={handleSignup} authError={authError} setAuthError={setAuthError} />
          )}
        </ThemeProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
